        <meta charset="utf-8">
        <title>Potato Tool</title>

    <body>
        <div id="safariErr" style="display: none"><p align="center" style="color: red">This tool is not supported on Safari browser!</p>
        </div>
        
        <div class="container" id="main">
            <div style="text-align: right; margin-top: 15px">
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" id="debugLogging" value="">
                    <label class="form-check-label" for="debugLogging">Show Debug log</label>
                </div>
            </div>

            <hr style="margin-top: 10px">
            
            <div id="program">
                <h3> Program </h3>
                <label for="baudrates" id="lblBaudrate">Baudrate:</label>
                <label style="display: none" id="lblConnTo">Connected to device: </label>
                <select name="baudrates" id="baudrates">
                    <option value="921600">921600</option>
                    <option value="460800">460800</option>
                    <option value="230400">230400</option>
                    <option value="115200">115200</option>
                </select>

                <br><br>

                <input class="btn btn-info btn-sm" type="button" id="connectButton" value="Connect">
                <input class="btn btn-warning btn-sm" type="button" id="disconnectButton" value="Disconnect">
                <input class="btn btn-danger btn-sm" type="button" id="eraseButton" value="Erase Flash">
                <br>

                <div class="alert alert-danger alert-dismissible" id="alertDiv" style="margin-top: 10px; display: none">
                    <a href="#" class="close" aria-label="close" onclick="$('.alert').hide()">×</a>
                    <span id="alertmsg"></span>
                </div>

                <div id="files">
                    <table class="table table-striped" id="fileTable">
                        <tbody id="tableBody">
                        </tbody>
                    </table>
                    <br>
                    <input class="btn btn-info btn-sm" type="button" id="programButton" value="Program">
                </div>

                <output id="list"></output>
                <hr>
            </div>

            <div id="parentSetting">
                <h3>親機Setting</h3>
                
                <div style="margin-bottom: 15px">
                    <input class="btn btn-info" type="button" id="parentStartButton" value="Start">
                    <input class="btn btn-info" type="button" id="parentStopButton" value="Stop" style="display: none">
                    <input class="btn btn-info" type="button" id="parentResetButton" value="Reset" style="display: none">
                </div>

                <div id="parentInputArea" style="margin-bottom: 15px">
                    <div class="form-group" style="max-width: 300px; margin-bottom: 10px">
                        <label for="idInput">ユーザーID (1〜1023):</label>
                        <input type="number" class="form-control" id="idInput" min="1" max="1023" placeholder="例: 123">
                    </div>
                    <input class="btn btn-success" type="button" id="sendIdButton" value="ID送信" style="display: none">
                </div>
                <hr>
            </div>

            <div id="subSetting">
                <h3>子機Setting</h3>
                
                <div style="margin-bottom: 15px">
                    <input class="btn btn-info" type="button" id="subStartButton" value="Start (BLE接続)">
                    <input class="btn btn-info" type="button" id="subStopButton" value="Stop (切断)" style="display: none">
                </div>

                <div id="subInputArea" style="margin-bottom: 15px">
                    <div class="form-group" style="max-width: 300px; margin-bottom: 10px">
                        <label for="subIdInput">ユーザーID (1〜1023):</label>
                        <input type="number" class="form-control" id="subIdInput" min="1" max="1023" placeholder="例: 123">
                    </div>
                    <input class="btn btn-success" type="button" id="subSendIdButton" value="ID送信" style="display: none">
                </div>
                <hr>
            </div>

            <div id="terminal" style="background-color: #000; border-radius: 4px; margin-bottom: 20px; padding: 10px"></div>
        </div>
