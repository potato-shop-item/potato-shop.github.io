<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>WebUSB Serial Terminal</title>
</head>
<body>
    <button id="connect-btn">デバイスに接続</button>
    <button id="send-btn">データ送信</button>
    <pre id="output"></pre>

    <!-- Web Serial API Polyfill を読み込み -->
    <script src="https://jsdelivr.net"></script>
    
    <script>
        let port;

        document.getElementById('connect-btn').addEventListener('click', async () => {
            try {
                // USBシリアルの要求（ベンダーIDなどを指定して絞り込みも可能）
                port = await navigator.serial.requestPort();
                
                // ボーレートなどを設定してポートを開く
                await port.open({ baudRate: 9600 });
                document.getElementById('output').textContent += "接続成功\n";
                
                // 受信処理の開始
                while (port.readable) {
                    const reader = port.readable.getReader();
                    try {
                        while (true) {
                            const { value, done } = await reader.read();
                            if (done) break;
                            const text = new TextDecoder().decode(value);
                            document.getElementById('output').textContent += text;
                        }
                    } catch (error) {
                        console.error(error);
                    } finally {
                        reader.releaseLock();
                    }
                }
            } catch (err) {
                console.error("接続失敗:", err);
            }
        });

        document.getElementById('send-btn').addEventListener('click', async () => {
            if (!port) return alert("先に接続してください");
            const writer = port.writable.getWriter();
            const data = new TextEncoder().encode("Hello USB Serial\r\n");
            await writer.write(data);
            writer.releaseLock();
        });
    </script>
</body>
</html>
