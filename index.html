<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Web Serial on Android</title>
  <!-- ポリフィルの読み込み -->
  <script src="https://unpkg.com"></script>
</head>
<body>
  <button id="connectBtn">シリアル接続</button>
  <button id="sendBtn" disabled>送信</button>
  <pre id="log"></pre>

  <script>
    let port;
    const logEl = document.getElementById('log');

    function appendLog(str) {
      logEl.textContent += str + '\n';
    }

    document.getElementById('connectBtn').addEventListener('click', async () => {
      try {
        // ポートの選択画面を呼び出し
        port = await navigator.serial.requestPort();
        await port.open({ baudRate: 9600 }); // ボーレートを指定
        appendLog('接続成功！');
        document.getElementById('sendBtn').disabled = false;

        // 受信ループの開始
        while (port.readable) {
          const reader = port.readable.getReader();
          try {
            while (true) {
              const { value, done } = await reader.read();
              if (done) break;
              // 受信データの処理
              const decoder = new TextDecoder();
              appendLog('受信: ' + decoder.decode(value));
            }
          } catch (error) {
            console.error(error);
          } finally {
            reader.releaseLock();
          }
        }
      } catch (err) {
        appendLog('エラー: ' + err);
      }
    });

    document.getElementById('sendBtn').addEventListener('click', async () => {
      if (!port) return;
      const writer = port.writable.getWriter();
      const data = new TextEncoder().encode('Hello Arduino\n');
      await writer.write(data);
      writer.releaseLock();
      appendLog('送信: Hello Arduino');
    });
  </script>
</body>
</html>
